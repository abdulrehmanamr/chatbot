<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice Chatbot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0eff8;
    --muted: #8b8aa0;
    --accent: #7c6dfa;
    --accent2: #a394ff;
    --accent-glow: rgba(124,109,250,0.25);
    --user-bg: #7c6dfa;
    --ai-bg: #1c1c26;
    --danger: #f06060;
    --danger-glow: rgba(240,96,96,0.3);
    --success: #52d48a;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --r: 14px;
    --r-sm: 8px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
    overflow-x: hidden;
  }

  /* background grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(124,109,250,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,109,250,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* glow orb */
  body::after {
    content: '';
    position: fixed;
    top: -200px; left: 50%; transform: translateX(-50%);
    width: 700px; height: 400px;
    background: radial-gradient(ellipse, rgba(124,109,250,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative; z-index: 1;
    width: 100%; max-width: 720px;
    min-height: 100vh;
    display: flex; flex-direction: column;
    padding: 0 16px 24px;
  }

  /* HEADER */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 0 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
  }

  .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-head);
    font-size: 18px; font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
    text-decoration: none;
  }

  .logo-icon {
    width: 34px; height: 34px; border-radius: 10px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    box-shadow: 0 0 16px var(--accent-glow);
  }

  .logo span { color: var(--accent2); }

  .header-right {
    display: flex; align-items: center; gap: 10px;
  }

  .tts-toggle {
    display: flex; align-items: center; gap: 7px;
    font-size: 12px; color: var(--muted);
    cursor: pointer; user-select: none;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
    transition: all 0.2s;
  }

  .tts-toggle:hover { border-color: var(--border2); color: var(--text); }
  .tts-toggle input { display: none; }

  .toggle-dot {
    width: 28px; height: 16px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border2);
    position: relative; transition: background 0.25s;
    flex-shrink: 0;
  }
  .toggle-dot::after {
    content: '';
    position: absolute; top: 2px; left: 2px;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--muted);
    transition: transform 0.25s, background 0.25s;
  }
  input:checked + .toggle-dot { background: rgba(124,109,250,0.3); border-color: var(--accent); }
  input:checked + .toggle-dot::after { transform: translateX(12px); background: var(--accent); }

  .clear-btn {
    width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--muted); cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .clear-btn:hover { border-color: var(--danger); color: var(--danger); background: rgba(240,96,96,0.07); }

  /* CHAT AREA */
  #chat-box {
    flex: 1;
    padding: 20px 0;
    display: flex; flex-direction: column; gap: 16px;
    overflow-y: auto;
    min-height: 300px;
    max-height: calc(100vh - 260px);
    scroll-behavior: smooth;
  }

  #chat-box::-webkit-scrollbar { width: 4px; }
  #chat-box::-webkit-scrollbar-track { background: transparent; }
  #chat-box::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .empty-state {
    margin: auto;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    opacity: 0.5;
  }

  .empty-icon {
    width: 56px; height: 56px; border-radius: 16px;
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }

  .empty-state p {
    font-size: 14px; color: var(--muted);
    text-align: center; max-width: 240px; line-height: 1.6;
  }

  /* MESSAGES */
  .msg {
    display: flex; gap: 10px; align-items: flex-end;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; flex-shrink: 0;
    font-family: var(--font-head);
  }

  .msg.user .avatar {
    background: var(--accent); color: #fff;
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .msg.assistant .avatar {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--accent2);
    font-size: 16px;
  }

  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    font-size: 14px; line-height: 1.65;
    border-radius: 18px;
    position: relative;
    word-break: break-word;
  }

  .msg.user .bubble {
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 20px rgba(124,109,250,0.3);
  }

  .msg.assistant .bubble {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg-time {
    font-size: 10px; color: var(--muted);
    margin-top: 4px;
    padding: 0 4px;
  }

  .msg.user .msg-time { text-align: right; }

  .msg-wrap { display: flex; flex-direction: column; max-width: 75%; }
  .msg.user .msg-wrap { align-items: flex-end; }

  /* TYPING */
  .typing-bubble {
    display: flex; gap: 5px; align-items: center;
    padding: 14px 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 18px; border-bottom-left-radius: 4px;
  }

  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* STATUS BAR */
  #status-bar {
    height: 28px; display: flex; align-items: center;
    justify-content: center; gap: 6px;
    font-size: 12px; color: var(--muted);
    transition: all 0.3s;
  }

  #status-bar .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }

  #status-bar.listening { color: var(--danger); }
  #status-bar.listening .status-dot {
    background: var(--danger);
    animation: blink 0.8s infinite;
    box-shadow: 0 0 8px var(--danger-glow);
  }

  #status-bar.thinking { color: var(--accent2); }
  #status-bar.thinking .status-dot { background: var(--accent); }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* INPUT AREA */
  .input-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 8px 8px 16px;
    display: flex; align-items: flex-end; gap: 8px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-area:focus-within {
    border-color: var(--border2);
    box-shadow: 0 0 0 3px rgba(124,109,250,0.1);
  }

  #text-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: var(--font-body);
    font-size: 14px; line-height: 1.5;
    resize: none; min-height: 22px; max-height: 120px;
    padding: 2px 0;
    overflow-y: auto;
  }

  #text-input::placeholder { color: var(--muted); }

  .input-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

  .icon-btn {
    width: 38px; height: 38px; border-radius: 12px;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; transition: all 0.2s;
    font-family: inherit;
  }

  #mic-btn {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border2);
  }

  #mic-btn:hover { color: var(--text); border-color: var(--border2); }

  #mic-btn.listening {
    background: rgba(240,96,96,0.15);
    color: var(--danger);
    border-color: var(--danger);
    box-shadow: 0 0 14px var(--danger-glow);
    animation: micPulse 1s infinite;
  }

  @keyframes micPulse {
    0%,100% { box-shadow: 0 0 14px var(--danger-glow); }
    50% { box-shadow: 0 0 22px rgba(240,96,96,0.5); }
  }

  #mic-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  #send-btn {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 12px var(--accent-glow);
  }

  #send-btn:hover { background: #6a5ce8; transform: scale(1.05); }
  #send-btn:active { transform: scale(0.97); }
  #send-btn:disabled { opacity: 0.35; transform: none; cursor: not-allowed; }

  /* QUICK PROMPTS */
  .quick-prompts {
    display: flex; flex-wrap: wrap; gap: 7px;
    margin-bottom: 10px;
  }

  .qp {
    font-size: 12px; padding: 5px 12px;
    border: 1px solid var(--border2); border-radius: 20px;
    background: var(--surface); color: var(--muted);
    cursor: pointer; transition: all 0.2s;
    font-family: var(--font-body);
  }

  .qp:hover { border-color: var(--accent); color: var(--accent2); background: rgba(124,109,250,0.07); }

  /* ERROR TOAST */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--danger); font-size: 13px;
    padding: 10px 20px; border-radius: 10px;
    transition: transform 0.3s ease;
    z-index: 100; white-space: nowrap;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }

  #toast.show { transform: translateX(-50%) translateY(0); }

  /* SPEAKING INDICATOR ON BUBBLE */
  .bubble.speaking::after {
    content: ' 🔊';
    font-size: 11px; opacity: 0.6;
  }

  /* RESPONSIVE */
  @media (max-width: 480px) {
    header { padding: 14px 0 12px; }
    .logo span.logo-label { display: none; }
    .bubble { max-width: 85%; font-size: 13px; }
    .msg-wrap { max-width: 85%; }
    #chat-box { max-height: calc(100vh - 230px); }
  }
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <a class="logo" href="#">
      <div class="logo-icon">🎙️</div>
      Voice<span>AI</span> <span class="logo-label">Chat</span>
    </a>
    <div class="header-right">
      <label class="tts-toggle" title="Toggle voice responses">
        <input type="checkbox" id="tts-on" checked>
        <div class="toggle-dot"></div>
        <span id="tts-label">Voice on</span>
      </label>
      <button class="clear-btn" id="clear-btn" title="Clear chat">🗑</button>
    </div>
  </header>

  <div id="chat-box">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">🎤</div>
      <p>Click the mic button or type a message to start your AI voice conversation</p>
    </div>
  </div>

  <div id="status-bar">
    <div class="status-dot"></div>
    <span id="status-text">Ready</span>
  </div>

  <div class="quick-prompts" id="quick-prompts">
    <button class="qp" data-text="Hello! Who are you?">👋 Introduce yourself</button>
    <button class="qp" data-text="Tell me an interesting fact">💡 Fun fact</button>
    <button class="qp" data-text="What can you help me with?">🤔 What can you do?</button>
    <button class="qp" data-text="Tell me a short joke">😄 Tell a joke</button>
  </div>

  <div class="input-area">
    <textarea id="text-input" placeholder="Type a message..." rows="1" autocomplete="off"></textarea>
    <div class="input-actions">
      <button class="icon-btn" id="mic-btn" title="Click to speak">🎤</button>
      <button class="icon-btn" id="send-btn" title="Send message">➤</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const chatBox = document.getElementById('chat-box');
const micBtn = document.getElementById('mic-btn');
const textInput = document.getElementById('text-input');
const sendBtn = document.getElementById('send-btn');
const statusBar = document.getElementById('status-bar');
const statusText = document.getElementById('status-text');
const ttsToggle = document.getElementById('tts-on');
const ttsLabel = document.getElementById('tts-label');
const clearBtn = document.getElementById('clear-btn');
const emptyState = document.getElementById('empty-state');
const toastEl = document.getElementById('toast');
const quickPrompts = document.getElementById('quick-prompts');

let history = [];
let recognition = null;
let isListening = false;
let isSpeaking = false;
let currentUtterance = null;
let toastTimer = null;

// API KEY — replace if needed (leave blank to use Anthropic proxy)
const API_URL = 'https://api.anthropic.com/v1/messages';

// ── Helpers ──────────────────────────────────────────────────────────────────

function setStatus(msg, state = '') {
  statusText.textContent = msg;
  statusBar.className = state ? `${state}` : '';
}

function showToast(msg, duration = 3500) {
  clearTimeout(toastTimer);
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
}

function getTime() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function autoResize() {
  textInput.style.height = 'auto';
  textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
}

function scrollToBottom() {
  chatBox.scrollTop = chatBox.scrollHeight;
}

// ── Add message ───────────────────────────────────────────────────────────────

function addMessage(role, text) {
  if (emptyState) { emptyState.remove(); }
  if (quickPrompts) { quickPrompts.remove(); }

  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'Y' : '🤖';

  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = getTime();

  wrap.appendChild(bubble);
  wrap.appendChild(time);
  msg.appendChild(avatar);
  msg.appendChild(wrap);
  chatBox.appendChild(msg);
  scrollToBottom();
  return bubble;
}

function showTyping() {
  const msg = document.createElement('div');
  msg.className = 'msg assistant';
  msg.id = 'typing-indicator';

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = '🤖';

  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chatBox.appendChild(msg);
  scrollToBottom();
  return msg;
}

// ── TTS ───────────────────────────────────────────────────────────────────────

function speak(text, bubble) {
  if (!ttsToggle.checked) return;
  if (!window.speechSynthesis) return;

  if (currentUtterance) window.speechSynthesis.cancel();

  // Wait for voices to load
  const trySpeak = () => {
    const voices = window.speechSynthesis.getVoices();
    currentUtterance = new SpeechSynthesisUtterance(text);
    currentUtterance.rate = 1.05;
    currentUtterance.pitch = 1;
    currentUtterance.volume = 1;

    // Prefer English voice
    const preferred = voices.find(v => v.lang.startsWith('en') && !v.name.includes('Google')) ||
                      voices.find(v => v.lang.startsWith('en')) || voices[0];
    if (preferred) currentUtterance.voice = preferred;

    if (bubble) bubble.classList.add('speaking');

    currentUtterance.onend = () => {
      isSpeaking = false;
      if (bubble) bubble.classList.remove('speaking');
      setStatus('Ready');
    };
    currentUtterance.onerror = () => {
      isSpeaking = false;
      if (bubble) bubble.classList.remove('speaking');
    };

    isSpeaking = true;
    setStatus('Speaking...', 'thinking');
    window.speechSynthesis.speak(currentUtterance);
  };

  if (window.speechSynthesis.getVoices().length === 0) {
    window.speechSynthesis.addEventListener('voiceschanged', trySpeak, { once: true });
  } else {
    trySpeak();
  }
}

ttsToggle.addEventListener('change', () => {
  ttsLabel.textContent = ttsToggle.checked ? 'Voice on' : 'Voice off';
  if (!ttsToggle.checked && window.speechSynthesis) {
    window.speechSynthesis.cancel();
    isSpeaking = false;
  }
});

// ── Send message ──────────────────────────────────────────────────────────────

async function sendMessage(userText) {
  userText = userText.trim();
  if (!userText) return;

  textInput.value = '';
  textInput.style.height = 'auto';
  sendBtn.disabled = true;
  addMessage('user', userText);
  history.push({ role: 'user', content: userText });

  const typing = showTyping();
  setStatus('Thinking...', 'thinking');

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'You are a friendly, helpful AI voice assistant. Keep replies conversational, warm, and concise — as if speaking aloud. Avoid markdown, bullet points, lists, or special formatting. Use short natural sentences. If asked your name, say you are VoiceAI.',
        messages: history
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `Server error ${res.status}`);
    }

    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Sorry, I did not get a response.';
    history.push({ role: 'assistant', content: reply });

    typing.remove();
    const bubble = addMessage('assistant', reply);
    setStatus('Ready');
    speak(reply, bubble);

  } catch (e) {
    typing.remove();
    const errMsg = e.message.includes('Failed to fetch')
      ? 'Network error. Check your connection.'
      : 'Error: ' + e.message;
    showToast('⚠️ ' + errMsg);
    setStatus('Error — try again');
    history.pop(); // remove failed user message from history
  }

  sendBtn.disabled = false;
}

// ── Input events ──────────────────────────────────────────────────────────────

textInput.addEventListener('input', autoResize);

textInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(textInput.value);
  }
});

sendBtn.addEventListener('click', () => sendMessage(textInput.value));

// Quick prompts
document.querySelectorAll('.qp').forEach(btn => {
  btn.addEventListener('click', () => sendMessage(btn.dataset.text));
});

// Clear
clearBtn.addEventListener('click', () => {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  history = [];
  chatBox.innerHTML = '';
  const empty = document.createElement('div');
  empty.className = 'empty-state'; empty.id = 'empty-state';
  empty.innerHTML = '<div class="empty-icon">🎤</div><p>Click the mic button or type a message to start your AI voice conversation</p>';
  chatBox.appendChild(empty);
  setStatus('Ready');
});

// ── Speech Recognition ────────────────────────────────────────────────────────

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  micBtn.disabled = true;
  micBtn.title = 'Voice input not supported in this browser (use Chrome)';
  showToast('🎤 Mic not supported — please use Chrome or Edge', 5000);
} else {
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    micBtn.classList.add('listening');
    micBtn.textContent = '⏹';
    setStatus('Listening...', 'listening');
  };

  recognition.onresult = e => {
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    textInput.value = final || interim;
    autoResize();
    if (final) {
      sendMessage(final);
      textInput.value = '';
      autoResize();
    }
  };

  recognition.onerror = e => {
    isListening = false;
    micBtn.classList.remove('listening');
    micBtn.textContent = '🎤';
    if (e.error === 'not-allowed') {
      showToast('🚫 Microphone permission denied — allow it in your browser settings');
      setStatus('Mic blocked');
    } else if (e.error === 'no-speech') {
      setStatus('No speech detected');
    } else {
      setStatus('Voice error: ' + e.error);
    }
  };

  recognition.onend = () => {
    isListening = false;
    micBtn.classList.remove('listening');
    micBtn.textContent = '🎤';
    if (statusText.textContent === 'Listening...') setStatus('Ready');
  };

  micBtn.addEventListener('click', () => {
    if (isListening) {
      recognition.stop();
      return;
    }
    if (isSpeaking && window.speechSynthesis) {
      window.speechSynthesis.cancel();
      isSpeaking = false;
    }
    textInput.value = '';
    autoResize();
    try { recognition.start(); }
    catch(e) { showToast('Could not start mic — try again'); }
  });
}
</script>
</body>
</html>
